<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Fantasy Leaderboard 2026 — The Dugout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F0A500;
    --silver: #A8A8A8;
    --bronze: #C47B3A;
    --bg: #0A0A0F;
    --surface: #12121A;
    --card: #1A1A26;
    --border: rgba(255,255,255,0.07);
    --text: #F0EDE8;
    --muted: #7A7A8C;
    --accent: #F0A500;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(240,165,0,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(100,80,200,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
  }
  .trophy-line {
    font-size: 40px;
    margin-bottom: 12px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .site-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 88px);
    letter-spacing: 4px;
    line-height: 0.9;
    background: linear-gradient(135deg, #F0A500 0%, #FFD166 40%, #F0A500 70%, #C47B3A 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .site-sub {
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 8px;
  }
  .match-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    padding: 6px 16px;
    border: 1px solid rgba(240,165,0,0.3);
    border-radius: 20px;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 1px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--surface);
    border-radius: 12px;
    margin: 32px 0 24px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .tab.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 1px 8px rgba(0,0,0,0.4);
  }

  /* ── PODIUM ── */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1.1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
    align-items: end;
  }
  .podium-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 16px;
    text-align: center;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .podium-card:hover { transform: translateY(-4px); }
  .podium-card.p1 {
    border-color: rgba(240,165,0,0.4);
    background: linear-gradient(160deg, #1E1A0A 0%, #1A1A26 100%);
    animation-delay: 0.1s;
  }
  .podium-card.p2 { animation-delay: 0.2s; }
  .podium-card.p3 { animation-delay: 0.3s; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .podium-medal { font-size: 28px; margin-bottom: 8px; }
  .podium-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
  }
  .p1 .podium-name { color: var(--gold); }
  .p2 .podium-name { color: var(--silver); }
  .p3 .podium-name { color: var(--bronze); }
  .podium-pts {
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
    margin: 6px 0 2px;
  }
  .p1 .podium-pts { color: var(--gold); }
  .podium-label { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .podium-meta { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* ── LEADERBOARD LIST ── */
  .lb-list { display: flex; flex-direction: column; gap: 8px; }
  .lb-row {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.4s ease both;
    text-decoration: none;
    color: inherit;
  }
  .lb-row:hover { border-color: rgba(240,165,0,0.25); transform: translateX(4px); }
  .lb-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--muted);
    text-align: center;
  }
  .lb-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
  }
  .lb-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .lb-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    text-align: right;
  }
  .lb-pts-label { font-size: 10px; color: var(--muted); text-align: right; letter-spacing: 2px; }
  .lb-bar-wrap { grid-column: 1/-1; margin-top: -4px; height: 2px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .lb-bar { height: 100%; background: linear-gradient(90deg, var(--gold), #FFD166); border-radius: 2px; transition: width 1s ease; }

  /* ── CHART ── */
  .chart-section { margin: 32px 0; }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; width: 100%; height: 240px; }

  /* ── SQUAD VIEW ── */
  .squad-section { display: none; }
  .squad-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .squad-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeUp 0.4s ease both;
  }
  .squad-card:hover { border-color: rgba(240,165,0,0.3); transform: translateY(-2px); }
  .squad-card-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .squad-card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
  }
  .squad-card-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold);
  }
  .squad-card-body { padding: 12px 18px 16px; }
  .squad-player-chip {
    display: inline-block;
    margin: 3px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.15s;
  }
  .squad-player-chip.has-pts {
    color: var(--text);
    border-color: rgba(240,165,0,0.25);
    background: rgba(240,165,0,0.07);
  }

  /* ── PLAYER MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    justify-content: center;
    align-items: flex-end;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 24px 40px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal-owner {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    color: var(--gold);
  }
  .modal-total { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  .modal-player {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .modal-player:last-child { border-bottom: none; }
  .modal-pname { font-size: 14px; font-weight: 500; }
  .modal-pts { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); }
  .modal-pts.zero { color: var(--muted); }
  .close-btn {
    position: absolute;
    top: 24px;
    right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── BADGES ── */
  .role-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .rb-bat { background: rgba(56,130,221,0.15); color: #5BA3E8; }
  .rb-bowl { background: rgba(99,153,34,0.15); color: #82C44A; }
  .rb-ar { background: rgba(240,165,0,0.12); color: #F0A500; }
  .rb-wk { background: rgba(212,83,126,0.15); color: #E87AAF; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    border-top: 1px solid var(--border);
    margin-top: 60px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .podium { grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .podium-pts { font-size: 28px; }
    .squad-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="trophy-line">🏆</div>
    <div class="site-title">The Dugout</div>
    <div class="site-sub">IPL Fantasy Leaderboard 2026 &bull; Mock Auction</div>
    <div class="match-badge"><span class="dot"></span> Live after Match 3 &bull; Updated 30 Mar 2026</div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('standings',this)">Standings</button>
    <button class="tab" onclick="showTab('squads',this)">Squads</button>
    <button class="tab" onclick="showTab('chart',this)">Chart</button>
  </div>

  <!-- STANDINGS TAB -->
  <div id="tab-standings">
    <div class="podium" id="podium"></div>
    <div class="lb-list" id="lbList"></div>
  </div>

  <!-- SQUADS TAB -->
  <div id="tab-squads" style="display:none">
    <div class="squad-grid" id="squadGrid"></div>
  </div>

  <!-- CHART TAB -->
  <div id="tab-chart" style="display:none">
    <div class="chart-section">
      <div class="section-title">Points Breakdown</div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="chart-section" style="margin-top:32px">
      <div class="section-title">Top Scorers (All Squads)</div>
      <div id="topScorers"></div>
    </div>
  </div>
</div>

<!-- PLAYER MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" style="position:relative">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div class="modal-handle"></div>
    <div class="modal-owner" id="modalOwner"></div>
    <div class="modal-total" id="modalTotal"></div>
    <div id="modalPlayers"></div>

</div>

<footer>
  The Dugout &bull; IPL Fantasy 2026 &bull; Built with love for the group 🏏
</footer>

i":"bat","Nicholas Pooran":"wk","Rohit Sharma":"bat","Ishan Kishan":"wk","Mitchell Starc":"bowl","Avesh Khan":"bowl","Shivam Dube":"ar","Azmatullah Omarzai":"ar","Venkatesh Iyer":"ar","Mitchell Santner":"ar","Lungi Ngidi":"bowl","Marcus Stoinis":"ar","Ashutosh Sharma":"ar","Anuj Rawat":"wk","Karun Nair":"bat","Ashwani Kumar":"bowl","Aiden Markram":"ar","Vaibhav Sooryavanshi":"bat","Arshdeep Singh":"bowl","Yuzvendra Chahal":"bowl","Bhuvneshwar Kumar":"bowl","Hardik Pandya":"ar","Dasun Shanaka":"ar","Nitish Kumar Reddy":"ar","Finn Allen":"wk","Sherfane Rutherford":"bat","Shimron Hetmyer":"bat","MS Dhoni":"wk","Jaydev Unadkat":"bowl","Suyash Sharma":"bowl","Prithvi Shaw":"bat","Umran Malik":"bowl","Yash Thakur":"bowl","Kamindu Mendis":"ar","Naman Dhir":"bat","Harpreet Brar":"ar","Shubman Gill":"bat","Dewal Brevis":"bat","Rishabh Pant":"wk","Kuldeep Yadav":"bowl","Mukesh Kumar":"bowl","Josh Hazlewood":"bowl","Mohammed Shami":"bowl","Washington Sundar":"ar","Marco Jansen":"ar","Ajinkya Rahane":"bat","Tim David":"bat","Matt Henry":"bowl","Mayank Yadav":"bowl","Ramandeep Singh":"ar","Jacob Bethell":"ar","Urvil Patel":"bat","Devdutt Padikkal":"bat","Mohsin Khan":"bowl","Sameer Rizvi":"bat","Anshul Kamboj":"bowl"};

const MEDAL = ['🥇','🥈','🥉'];
const COLORS = ['#F0A500','#A8A8A8','#C47B3A','#5BA3E8','#82C44A','#E87AAF','#A07CF0','#FF7A5C'];

function total(owner){ return SQUADS[owner].reduce((s,p)=>s+(POINTS[p]||0),0); }
function ranked(){ return Object.keys(SQUADS).map(o=>({o,t:total(o)})).sort((a,b)=>b.t-a.t); }

const r = ranked();
const maxPts = r[0].t;

// PODIUM (top 3)
function buildPodium(){
  const order = [r[1], r[0], r[2]]; // silver, gold, bronze
  const classes = ['p2','p1','p3'];
  const medals = ['🥈','🥇','🥉'];
  document.getElementById('podium').innerHTML = order.map((item,i)=>`
    <div class="podium-card ${classes[i]}" onclick="openModal('${item.o}')">
      <div class="podium-medal">${medals[i]}</div>
      <div class="podium-name">${item.o}</div>
      <div class="podium-pts">${item.t}</div>
      <div class="podium-label">points</div>
      <div class="podium-meta">${SQUADS[item.o].filter(p=>POINTS[p]>0).length} players scored</div>
    </div>`).join('');
}

// FULL LEADERBOARD
function buildLB(){
  document.getElementById('lbList').innerHTML = r.slice(3).map((item,i)=>`
    <div class="lb-row" onclick="openModal('${item.o}')" style="animation-delay:${(i+4)*0.07}s">

        <div class="lb-pts-label">pts</div>
      </div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(item.t/maxPts*100)}%"></div></div>
    </div>`).join('');
}

// SQUADS GRID
function buildSquads(){
  document.getElementById('squadGrid').innerHTML = r.map(({o},idx)=>`
    <div class="squad-card" onclick="openModal('${o}')" style="animation-delay:${idx*0.07}s">
      <div class="squad-card-header">
        <div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px">Rank #${idx+1}</div>
          <div class="squad-card-name">${o}</div>
        </div>
        <div class="squad-card-pts">${total(o)}</div>
      </div>
      <div class="squad-card-body">
        ${SQUADS[o].map(p=>`<span class="squad-player-chip ${(POINTS[p]||0)>0?'has-pts':''}">${p} ${(POINTS[p]||0)>0?'<b style="color:var(--gold)">'+POINTS[p]+'</b>':''}</span>`).join('')}
      </div>
    </div>`).join('');
}

// CHART
let chartInst = null;
function buildChart(){
  if(chartInst) return;
  const labels = r.map(x=>x.o);
  const data = r.map(x=>x.t);
  chartInst = new Chart(document.getElementById('mainChart'),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:COLORS,borderRadius:8,borderSkipped:false}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y} pts`},backgroundColor:'#1A1A26',titleColor:'#F0EDE8',bodyColor:'#A8A8A8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},
      scales:{
        x:{grid:{display:false},ticks:{color:'#7A7A8C',font:{size:12}}},
        y:{min:Math.max(0,Math.min(...data)-30),grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#7A7A8C',font:{size:11}}}
      }
    }
  });

  // Top scorers
  const allScored = Object.entries(POINTS)
    .filter(([p,pts])=>pts>0)
    .map(([p,pts])=>({p,pts,owner:Object.entries(SQUADS).find(([o,ps])=>ps.includes(p))?.[0]||'?'}))
    .sort((a,b)=>b.pts-a.pts)
    .slice(0,10);

  document.getElementById('topScorers').innerHTML = allScored.map((item,i)=>`
    <div style="display:grid;grid-template-columns:28px 1fr auto auto;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-family:'Bebas Neue';font-size:20px;color:var(--muted)">${i+1}</div>
      <div>
        <div style="font-size:14px;font-weight:500">${item.p}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:1px">${item.owner}</div>
      </div>
      <span class="role-badge rb-${ROLES[item.p]||'bat'}">${(ROLES[item.p]||'bat').toUpperCase()}</span>
      <div style="font-family:'Bebas Neue';font-size:26px;color:var(--gold)">${item.pts}</div>
    </div>`).join('');
}

// MODAL
function openModal(owner){
  document.getElementById('modalOwner').textContent = owner;
  const rank = r.findIndex(x=>x.o===owner)+1;
  document.getElementById('modalTotal').textContent = `Rank #${rank} · ${total(owner)} points · ${SQUADS[owner].filter(p=>POINTS[p]>0).length} players scored`;
  document.getElementById('modalPlayers').innerHTML = [...SQUADS[owner]]
    .sort((a,b)=>(POINTS[b]||0)-(POINTS[a]||0))
    .map(p=>`
      <div class="modal-player">
        <div class="modal-pname">${p}</div>
        <span class="role-badge rb-${ROLES[p]||'bat'}">${(ROLES[p]||'bat').toUpperCase()}</span>
        <div class="modal-pts ${(POINTS[p]||0)===0?'zero':''}">${POINTS[p]||0}</div>
      </div>`).join('');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e && e.target!==document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

// TABS
function showTab(name, btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-standings').style.display = name==='standings'?'block':'none';
  document.getElementById('tab-squads').style.display = name==='squads'?'block':'none';
  document.getElementById('tab-chart').style.display = name==='chart'?'block':'none';
  if(name==='chart') setTimeout(buildChart, 50);
}

buildPodium();
buildLB();
buildSquads();
</script>
</body>
</html>
