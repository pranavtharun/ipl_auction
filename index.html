// ================= VALUE FUNCTION =================
function playerValue(p){
  return (POINTS[p] || 0) / (PRICES[p] || 1);
}

// ================= UPDATED CHART =================
let chartInst = null;

function buildChart(){
  if(chartInst) return;

  const players = Object.keys(POINTS)
    .map(p => ({
      name: p,
      value: playerValue(p),
      pts: POINTS[p],
      price: PRICES[p] || 0,
      owner: Object.entries(SQUADS).find(([o, ps]) => ps.includes(p))?.[0] || '?'
    }))
    .filter(p => p.pts > 0)
    .sort((a,b) => b.value - a.value)
    .slice(0,10);

  const labels = players.map(p => p.name);
  const data = players.map(p => p.value);

  chartInst = new Chart(document.getElementById('mainChart'),{
    type:'bar',
    data:{
      labels,
      datasets:[{
        data,
        backgroundColor:'#F0A500',
        borderRadius:8
      }]
    },
    options:{
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label: c => {
              const p = players[c.dataIndex];
              return `${p.pts} pts / ₹${p.price} = ${p.value.toFixed(2)}`;
            }
          }
        }
      },
      scales:{
        x:{ticks:{color:'#7A7A8C'}},
        y:{ticks:{color:'#7A7A8C'}}
      }
    }
  });

  // update title
  document.querySelector('.section-title').textContent = "Most Valuable Buys 💎";

  // update list
  document.getElementById('topScorers').innerHTML = players.map((p,i)=>`
    <div style="display:grid;grid-template-columns:28px 1fr auto auto;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div>${i+1}</div>
      <div>
        <div>${p.name}</div>
        <div style="font-size:11px;color:gray">${p.owner}</div>
      </div>
      <div>₹${p.price}</div>
      <div style="color:#F0A500">${p.value.toFixed(2)}</div>
    </div>
  `).join('');
}
